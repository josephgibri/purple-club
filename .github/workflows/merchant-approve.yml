name: Merchant approve

on:
  issues:
    types: [labeled]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  apply:
    if: github.event.label.name == 'approved'
    runs-on: ubuntu-latest
    steps:
      - name: Verify maintainer allowlist
        id: verify
        env:
          MAINTAINERS: ${{ secrets.MERCHANT_APPROVERS }}
          SENDER: ${{ github.event.sender.login }}
        run: |
          MAINTAINERS_FALLBACK="${{ github.repository_owner }}"
          LIST="${MAINTAINERS:-$MAINTAINERS_FALLBACK}"
          IFS=',' read -ra ALLOW <<< "$LIST"
          ok=0
          for u in "${ALLOW[@]}"; do
            if [ "$(echo "$u" | tr -d ' ')" = "$SENDER" ]; then ok=1; break; fi
          done
          if [ "$ok" != "1" ]; then
            echo "Sender $SENDER is not in maintainer allowlist ($LIST)"
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Build payload
        id: payload
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          node <<'NODE'
          const fs = require("node:fs");
          const body = process.env.ISSUE_BODY ?? "";
          const match = body.match(/```yaml\s*([\s\S]*?)```/i);
          if (!match) {
            throw new Error("Could not find YAML payload block in issue body.");
          }

          const yamlBlock = match[1];
          const data = {};
          for (const rawLine of yamlBlock.split("\n")) {
            const line = rawLine.trim();
            if (!line || !line.includes(":")) continue;
            const idx = line.indexOf(":");
            const key = line.slice(0, idx).trim();
            const rawValue = line.slice(idx + 1).trim();
            if (!key) continue;
            try {
              data[key] = JSON.parse(rawValue);
            } catch {
              data[key] = rawValue;
            }
          }

          const asBool = (v) => String(v).toLowerCase() === "true";
          const num = (v) => (v === "" || v == null ? undefined : Number(v));
          const clean = (v) => (v == null ? "" : String(v));
          const payload = {
            type: clean(data.type) || "submit",
            merchantId: clean(data.merchantId) || undefined,
            businessName: clean(data.businessName),
            businessBrief: clean(data.businessBrief),
            category: clean(data.category),
            isOnline: asBool(data.isOnline),
            country: clean(data.country),
            city: clean(data.city),
            fullAddress: clean(data.fullAddress),
            lat: num(data.lat),
            lng: num(data.lng),
            website: clean(data.website),
            logoUrl: clean(data.logoUrl),
            heroImageUrl: clean(data.heroImageUrl),
            promoCode: clean(data.promoCode),
            discountDetails: clean(data.discountDetails),
            socialPlatform: clean(data.socialPlatform) || undefined,
            socialHandle: clean(data.socialHandle) || undefined,
            email: clean(data.email),
            // Workflow-signed marker so the schema (which requires turnstileToken)
            // passes without re-verifying captcha server-side during PR apply.
            turnstileToken: "workflow-approved",
          };
          fs.writeFileSync("payload.json", JSON.stringify(payload, null, 2));
          NODE

      - name: Export URL fields for reachability checks
        run: |
          node <<'NODE'
          const fs = require("node:fs");
          const payload = JSON.parse(fs.readFileSync("payload.json", "utf8"));
          const out = process.env.GITHUB_ENV;
          fs.appendFileSync(out, `WEBSITE=${payload.website ?? ""}\n`);
          fs.appendFileSync(out, `LOGO=${payload.logoUrl ?? ""}\n`);
          fs.appendFileSync(out, `HERO=${payload.heroImageUrl ?? ""}\n`);
          NODE

      - name: Validate remote URLs reachable
        run: |
          set -e
          for url in "$WEBSITE" "$LOGO" "$HERO"; do
            if [ -z "$url" ]; then continue; fi
            code=$(curl -sSL -o /dev/null -w "%{http_code}" --max-time 10 "$url" || echo "000")
            if [ "$code" -lt 200 ] || [ "$code" -ge 400 ]; then
              echo "URL returned HTTP $code: $url"
              exit 1
            fi
          done

      - name: Apply merchant change
        run: npx tsx scripts/apply-merchant-change.ts payload.json

      - name: Compose PR body
        id: prbody
        env:
          ISSUE_NUM: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
        run: |
          {
            echo "body<<EOF"
            echo "Automated merchant change from issue #${ISSUE_NUM}: ${ISSUE_TITLE}"
            echo ""
            echo "Closes #${ISSUE_NUM}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Open pull request
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore(merchants): apply change from issue #${{ github.event.issue.number }}"
          title: "Merchant: ${{ github.event.issue.title }}"
          body: ${{ steps.prbody.outputs.body }}
          branch: merchant/issue-${{ github.event.issue.number }}
          base: main
          delete-branch: true
          labels: merchant-auto-pr

      - name: Comment on issue with failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const issue_number = context.payload.issue.number;
            await github.rest.issues.removeLabel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number,
              name: "approved",
            }).catch(() => {});
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number,
              labels: ["needs-info"],
            });
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number,
              body: "Automated approval failed. Run failed on " + context.runId + ". Please address and re-label once resolved.",
            });
